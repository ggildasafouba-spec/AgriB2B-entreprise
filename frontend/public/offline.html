<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriB2B - Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0fdf4; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .container { text-align: center; max-width: 400px; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { color: #166534; font-size: 24px; margin-bottom: 12px; }
    p { color: #6b7280; font-size: 16px; line-height: 1.5; margin-bottom: 24px; }
    button { background: #16a34a; color: white; border: none; padding: 12px 32px; border-radius: 12px; font-size: 16px; cursor: pointer; }
    button:hover { background: #15803d; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌾</div>
    <h1>Pas de connexion internet</h1>
    <p>Vous etes actuellement hors ligne. Verifiez votre connexion internet et reessayez.</p>
    <button onclick="window.location.reload()">Reessayer</button>
  </div>
</body>
</html>
