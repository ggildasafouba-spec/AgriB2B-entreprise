# Docker Compose minimal : uniquement PostgreSQL + Redis
# Le backend et le frontend tournent directement sur la machine
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agromarket
      POSTGRES_PASSWORD: agromarket
      POSTGRES_DB: agromarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agromarket"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
